<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#173c2d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>우리 숲에 찾아온 멸종위기동물 친구들</title>
  <link rel="stylesheet" href="style.css?v=20260705-2315" />
</head>
<body>
  <div id="app-shell">
    <div id="renderer-shell" aria-hidden="true"></div>

    <section id="splash-screen" class="screen-card">
      <div class="badge">AR 숲 생태 체험</div>
      <h1>우리 숲에<br>누구를 초대할까요?</h1>
      <p class="lead">동물 한 마리를 고른 뒤, AR을 시작해서<br>내가 만든 숲 위 원하는 자리에 놓아 보세요.</p>

      <div id="support-note" class="support-note">기기를 확인하는 중이에요…</div>

      <div id="animal-grid" class="animal-grid" role="list" aria-label="동물 선택">
        <button class="animal-tile selected" data-animal="bear" type="button">
          <img src="assets/animals/bear-thumb.png" alt="반달가슴곰" />
          <span>반달가슴곰</span>
        </button>
        <button class="animal-tile" data-animal="otter" type="button">
          <img src="assets/animals/otter-thumb.png" alt="수달" />
          <span>수달</span>
        </button>
        <button class="animal-tile" data-animal="goral" type="button">
          <img src="assets/animals/goral-thumb.png" alt="산양" />
          <span>산양</span>
        </button>
        <button class="animal-tile" data-animal="spoonbill" type="button">
          <img src="assets/animals/spoonbill-thumb.png" alt="저어새" />
          <span>저어새</span>
        </button>
      </div>

      <button id="enter-ar-button" class="primary-button" type="button">선택한 동물과 AR 시작하기</button>
      <p class="small-note">권장 환경: ARCore 지원 안드로이드 휴대폰/태블릿 + Chrome</p>
    </section>

    <header id="hud" class="hidden" aria-live="polite">
      <div class="hud-title">🌿 우리 숲에 초대한 동물</div>
      <div class="hud-main">
        <strong id="selected-name">반달가슴곰</strong>
        <span id="status-text">숲의 바닥이나 작품 받침대를 천천히 비춰 주세요.</span>
      </div>
    </header>

    <section id="info-panel" class="info-panel hidden" aria-live="polite">
      <div class="info-head">
        <span id="info-badge" class="info-badge">숲 친구</span>
        <button id="close-info" class="mini-button" type="button" aria-label="닫기">×</button>
      </div>
      <h2 id="info-name">반달가슴곰</h2>
      <p id="info-message">숲을 깨끗하게 지켜 주세요.</p>
      <p id="info-question" class="question-box">이 동물이 살기 좋은 숲은 어떤 모습일까요?</p>
    </section>

    <section id="selector-sheet" class="selector-sheet hidden" aria-label="동물 바꾸기">
      <div class="sheet-header">
        <h2>다른 동물로 바꿔 볼까요?</h2>
        <button id="close-sheet" class="mini-button" type="button" aria-label="닫기">×</button>
      </div>
      <div id="sheet-grid" class="animal-grid compact" role="list"></div>
    </section>

    <footer id="bottom-bar" class="hidden">
      <button id="place-button" class="primary-button small" type="button">여기에 놓기</button>
      <div class="bottom-row">
        <button id="change-animal" class="secondary-button" type="button">동물 바꾸기</button>
        <button id="replace-button" class="secondary-button" type="button">다시 놓기</button>
      </div>
    </footer>

    <button id="tap-target" class="tap-target hidden" type="button" aria-label="화면을 눌러 동물 놓기"></button>
  </div>

  <script type="module" src="app.js?v=20260705-2315"></script>
</body>
</html>
